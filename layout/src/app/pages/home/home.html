<main class="flex flex-col min-h-screen bg-slate-50">
    <header class="mb-10 text-center md:text-left">
        <h2 class="text-3xl font-extrabold  text-slate-900">Tecnologias Frontend</h2>
        <p class="mt-3 text-lg text-slate-600">Conheça abaixo algumas tecnolgia Frontend</p>
    </header>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        <article *ngFor="let item of requisicao" class="group bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-xl hover:-translate-y-1 transition-all duration-300">
            <div class="p-6">
                <h3 class="inline-block px-3 py-1 text-xs font-semibold tracking-wide uppercase rounded-full bg-slate-100 text-slate-600">{{item.tecnologia}}</h3>
                <p class="mt-4 text-xl font-bold text-slate-800">{{item.descricao}}</p>
            </div>
        </article>
    </div>
</main>
