<main class="flex flex-col min-h-screen bg-slate-50">
    <header class="mb-10 text-center md:text-left">
        <h2 class="text-3xl font-extrabold  text-slate-900">Tecnologias Frontend</h2>
        <p class="mt-3 text-lg text-slate-600">Conheça abaixo algumas tecnolgia Frontend</p>
    </header>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        <article *ngFor="let item of requisicao"
            class="relative overflow-hidden bg-white border border-l-4 border-l-indigo-500 rounded-r-lg shadow-sm p-5">
            <h3 class="text-indigo-900 font-black text-xl mb-1">
                {{item.tecnologia}}
            </h3>
            <p class="text-gray-500 text-xs font-medium uppercase mb-2">Descrição técnica</p>
            <p class="text-gray-700 text-sm">
                {{item.descricao}}
            </p>
        </article>
    </div>
</main>
